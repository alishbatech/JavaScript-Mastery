<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style1.css">
 
</head>

<body>

    <div class="card">
        <h1>BMI Calculator</h1>
        <p class="subtitle">Find out your Body Mass Index</p>

        <div class="input-group">
            <label>Height (cm)</label>
            <input type="number" id="height" placeholder="Enter height" min="0" />
        </div>

        <div class="input-group">
            <label>Weight (kg)</label>
            <input type="number" id="weight" placeholder="Enter weight" min="0" />
        </div>

        <button onclick="calculateBMI()">Calculate BMI</button>

        <p class="error-msg" id="error">⚠️ Please enter valid height and weight.</p>

        <div class="result-box" id="resultBox">
            <div class="bmi-value" id="bmiValue">--</div>
            <div class="bmi-label">Your BMI Score</div>
            <span class="bmi-category" id="bmiCategory"></span>
        </div>

        <div class="guide">
            <p>BMI Guide</p>
            <div class="guide-items">
                <div class="guide-item"><span>Underweight</span><span>Below 18.5</span></div>
                <div class="guide-item"><span>Normal</span><span>18.5 – 24.9</span></div>
                <div class="guide-item"><span>Overweight</span><span>25 – 29.9</span></div>
                <div class="guide-item"><span>Obese</span><span>30 and above</span></div>
            </div>
        </div>
    </div>
<script src="script1.js"></script>

</body>

</html>
